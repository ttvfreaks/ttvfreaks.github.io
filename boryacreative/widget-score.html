<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>TAA Score</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/12.13.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore-compat.js"></script>
  <link rel="stylesheet" href="widget-score.css">
</head>
<body>
  <div id="score-wrap">
    <div class="score-row score-streamer">
      <span class="score-label" id="score-s-name">---</span>
      <span class="score-num" id="score-s-num">0</span>
    </div>
    <div class="score-divider"></div>
    <div class="score-row score-opponent">
      <span class="score-label" id="score-o-name">---</span>
      <span class="score-num" id="score-o-num">0</span>
    </div>
  </div>
  <script src="widget-score.js"></script>
</body>
</html>
