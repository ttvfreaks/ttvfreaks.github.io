<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta property="og:title" content="ПОЛАКОФОН — марафон melharucos">
  <meta property="og:description" content="Марафон Полакофон. Список активностей, таймер и мемы.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://melharucos.github.io/polakofon/">
  <meta property="og:image" content="https://melharucos.github.io/polakofon/og-image.jpg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="ПОЛАКОФОН — марафон melharucos">
  <meta name="twitter:description" content="Марафон Полакофон. Список активностей, таймер и мемы.">
  <title>Полакофон — марафон melharucos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;900&family=Playfair+Display:ital@0;1&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="icon" href="https://static-cdn.jtvnw.net/jtv_user_pictures/1f3d7e72-6c77-4fe7-9a08-def5ec31ed6b-profile_image-70x70.png">
</head>

<body>
  <div class="loading-screen" id="loading">
    <div class="loading-text">Загружаем Полакофон...</div>
  </div>

  <div class="container" id="container">
    <header class="hero">
      <div class="hero-main">
        <h1 class="hero-title">ПОЛАКОФОН</h1>
        <div class="hero-underline"></div>
        <div class="stream-status" id="stream-status">
          <div class="status-line">
            <span class="status-dot" id="status-dot"></span>
            <span class="status-text" id="status-text">загрузка...</span>
            <span class="status-uptime" id="status-uptime"></span>
          </div>
          <div class="status-title" id="status-title"></div>
          <div class="status-game" id="status-game"></div>
        </div>
      </div>
      <aside class="timer" id="timer">
        <!-- <span class="timer-label">Марафон</span> -->
        <div class="timer-display" id="timer-display"></div>
        <span class="timer-sublabel">с начала Полакофона</span>
      </aside>
    </header>

    <section class="activities">
      <h2 class="section-label">✧ Что планируется</h2>
      <div class="ungrouped" id="ungrouped-activities"></div>
      <div class="grouped" id="grouped-activities"></div>
    </section>

    <div class="container">
      <footer class="footer">
        <span>melharucos</span>
        <span>✧ лето 2026 ✧</span>
      </footer>
    </div>

    <h2 class="section-label">✧ Мемы</h2>
  </div>

  <section class="memes">
    <div class="memes-list" id="memes-list"></div>
  </section>


  <script src="js/script.js"></script>

  <div class="lightbox" id="lightbox">
    <span class="lightbox-close">&times;</span>
    <img class="lightbox-img" id="lightbox-img" src="">
  </div>
</body>

</html>
